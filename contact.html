<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | NestHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="top-banner">
    <marquee behavior="scroll" direction="left" scrollamount="6">
      Contact NestHub for Hyderabad property inquiries and premium listings
    </marquee>
  </div>
  <header class="page-top">
    <nav class="nav container">
      <a class="brand" href="index.html">NestHub</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="properties.html">Properties</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active btn btn-small">Contact</a>
      </div>
    </nav>
  </header>

  <main class="section container content-card">
    <h1>Contact NestHub</h1>
    <form class="contact-form" action="https://formspree.io/f/xpqgddzw" method="POST">
      <input type="text" name="name" placeholder="Your Name" />
      <input type="email" name="email" placeholder="Email Address" />
      <input type="text" name="area" placeholder="Preferred Area in Hyderabad" />
      <textarea name="message" rows="5" placeholder="Tell us about your property requirement"></textarea>
      <button class="btn" type="submit">Send Inquiry</button>
    </form>
  </main>
</body>
</html>
